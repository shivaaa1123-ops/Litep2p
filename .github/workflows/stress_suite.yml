name: Stress suite (self-hosted)

on:
  workflow_dispatch:
    inputs:
      quick:
        description: "Quick mode (shorter run)"
        required: false
        default: "0"
      loss_prob:
        description: "UDP drop probability (0.0-1.0)"
        required: false
        default: "0.10"
      loss_duration_sec:
        description: "How long to keep loss rules installed"
        required: false
        default: "30"
      reconnect_cycles:
        description: "Reconnect restart cycles"
        required: false
        default: "8"
      allow_chaos_failures:
        description: "1 => chaos/probe failures are informational"
        required: false
        default: "1"
      resource_chaos_enabled:
        description: "1 => enable stress-ng CPU/mem/io pressure (Linux)"
        required: false
        default: "0"
      tc_safe_mode:
        description: "1 => skip tc netem if host already has non-default qdisc"
        required: false
        default: "1"
  schedule:
    - cron: "0 3 * * *"

jobs:
  stress:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sg
            runner_label: litep2p-sg
          - name: us
            runner_label: litep2p-us
    runs-on: [self-hosted, "${{ matrix.runner_label }}"]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight sudo
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            if sudo -n true >/dev/null 2>&1; then
              echo "Passwordless sudo: OK"
            else
              echo "WARN: passwordless sudo not available. iptables/tc chaos may be skipped." >&2
            fi
          else
            echo "WARN: sudo not installed. iptables/tc chaos will be skipped." >&2
          fi

      - name: Run stress suite
        shell: bash
        env:
          QUICK: ${{ inputs.quick || '0' }}
          LOSS_PROB: ${{ inputs.loss_prob || '0.10' }}
          LOSS_DURATION_SEC: ${{ inputs.loss_duration_sec || '30' }}
          RECONNECT_CYCLES: ${{ inputs.reconnect_cycles || '8' }}
          ALLOW_CHAOS_FAILURES: ${{ inputs.allow_chaos_failures || '1' }}
          RESOURCE_CHAOS_ENABLED: ${{ inputs.resource_chaos_enabled || '0' }}
          TC_SAFE_MODE: ${{ inputs.tc_safe_mode || '1' }}
          OUT_DIR: /tmp/litep2p_stress_${{ matrix.name }}_${{ github.run_id }}
        run: |
          set -euo pipefail
          bash tools/harness/stress_suite.sh
          echo "OUT_DIR=${OUT_DIR}" >> "${GITHUB_ENV}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-${{ matrix.name }}
          path: ${{ env.OUT_DIR }}


